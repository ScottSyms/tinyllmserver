[tools]
cmake = "latest"
rust = "latest"

[env]
# llama.cpp build can be slow the first time; allow more parallelism.
CARGO_BUILD_JOBS = "8"

[tasks.build]
description = "Build a release binary"
run = "cargo build --release"

[tasks.run]
description = "Run the server (auto-downloads models on first launch)"
run = "cargo run --release --"

[tasks.fmt]
run = "cargo fmt"

[tasks.check]
run = "cargo check"
