[tools]
rust = "latest"

[env]
# OxiBonsai is pure Rust (no cmake/C++), but the dep tree is large; parallelize.
CARGO_BUILD_JOBS = "8"

[tasks.build]
description = "Build a release binary"
run = "cargo build --release"

[tasks.run]
description = "Run the server (auto-downloads models on first launch)"
run = "cargo run --release --"

[tasks.fmt]
run = "cargo fmt"

[tasks.check]
run = "cargo check"
